services:
  postgres:
    image: postgres:17
    hostname: nest_postgres
    container_name: nest_postgres
    restart: always
    environment:
      POSTGRES_DB: vorplay
      POSTGRES_USER: VorPlay
      POSTGRES_PASSWORD: ExdGr35M5sm3CwKc
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U VorPlay -d vorplay']
      interval: 5s
      timeout: 2s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest-api
    ports:
      - '3000:3000'
    env_file:
      - .env
    stdin_open: true
    tty: true # for debugging purposes
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  pgadmin4:
    image: dpage/pgadmin4:9.3
    container_name: nest-pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@email.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '15432:80'
    networks:
      - backend

volumes:
  postgres-data:

networks:
  backend:
    name: backend
